services:
  postgres:
    image: postgres:16
    container_name: pg16
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
      # Bật checksum ngay từ lúc init để tăng an toàn dữ liệu (không bắt buộc)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Mọi .sql/.sh trong thư mục này sẽ chạy MỘT LẦN khi DB KHỞI TẠO (data dir đang trống)
      - ../database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "${BACKEND_PORT}:8000"
    command: ["python", "-m", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ../backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: frontend
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${PORT}:${PORT}"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "${PORT}"]
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      TZ: ${TZ}
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pg_data:
  pgadmin_data:
  frontend_node_modules:
